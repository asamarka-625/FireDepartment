<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аутентификация — Противопожарная служба СПб</title>
    <link rel="stylesheet" href="/72tldh/static/css/main.css">
</head>
<body class="auth-body">

<div class="auth-container">
    <h1>Вход в систему</h1>

    <form id="loginForm" class="auth-form">
        <label for="username">Логин</label>
        <input type="text" id="username" required>

        <label for="password">Пароль</label>

        <div class="password-wrapper">
            <input type="password" id="password" required>
            <button type="button" id="togglePassword" class="toggle-password">
                👁
            </button>
        </div>

        <button type="submit" class="login-btn">Войти</button>
    </form>

    <p id="message" class="auth-message"></p>
</div>

<script src="/72tldh/static/js/authentication.js"></script>

<script>
// 👁 показать/скрыть пароль
const toggleBtn = document.getElementById("togglePassword");
const passwordInput = document.getElementById("password");

toggleBtn.addEventListener("click", () => {
    const type = passwordInput.type === "password" ? "text" : "password";
    passwordInput.type = type;

    toggleBtn.textContent = type === "password" ? "👁" : "🙈";
});
</script>

</body>
</html>
