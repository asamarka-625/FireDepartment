<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/72tldh/static/css/main.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <button id="logoutBtn" class="logout-btn">Выйти</button>
        </div>
        <div class="sidebar-content">
            <div class="structure">
                <p class="structure-title">{{ department }}</p>

                {% for section in sections %}
                    <div class="department">
                        <button type="button" class="accordion">
                            {{ section.title }}
                        </button>

                        <div class="panel">
                            <a href="/72tldh/equipment/{{ section.id }}">Сведения о технике</a>
                            <a href="/72tldh/reports/{{ section.id }}">История записок</a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </aside>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>

</div>
<div id="toast-container"></div>
<script src="/72tldh/static/js/main.js"></script>
</body>
</html>
